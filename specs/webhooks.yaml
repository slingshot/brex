    WebhookGroup:
      title: Webhook Group
      required:
        - id
        - name
      type: object
      properties:
        id:
          minLength: 1
          type: string
          description: The ID of the webhook group.
          example: wg_123
        name:
          minLength: 1
          type: string
          description: The name for the webhook group.
          example: Some Webhook Group
      description: >-
        A webhook group, which can be used by webhook subscriptions to target
        only the webhook group members. When an event occurs and it belongs to a
        member of the group, the webhooks will be sent only to the subscriptions
        that are associated with the group. If there is no group associated with
        the event, then the webhook will be sent to all subscriptions that are
        not associated with any group. Webhook groups are only available for
        partners.
      x-tags:
        - Schemas
    WebhookGroupMember:
      title: Webhook Group Member
      required:
        - group_id
        - member_id
        - member_type
      type: object
      properties:
        group_id:
          minLength: 1
          type: string
          description: The ID of the webhook group this member belongs to.
          example: wg_123
        member_type:
          allOf:
            - $ref: '#/components/schemas/WebhookGroupMemberType'
            - description: The type of webhook group member.
              example: ACCOUNT
        member_id:
          minLength: 1
          type: string
          description: The ID of the webhook group member.
          example: cuacc_123
      description: A member of a webhook group.
      x-tags:
        - Schemas
    WebhookGroupMemberInput:
      required:
        - member_id
        - member_type
      type: object
      properties:
        member_type:
          allOf:
            - $ref: '#/components/schemas/WebhookGroupMemberType'
            - description: The type of webhook group member.
        member_id:
          minLength: 1
          type: string
          description: The ID of the webhook group member.
    WebhookGroupMemberType:
      type: string
      description: The type of a webhook group member.
      enum:
        - ACCOUNT
      x-enumDescriptions:
        ACCOUNT: The webhook group member is a customer account.
    WebhookSecret:
      title: Webhook Secret
      required:
        - secret
        - status
      type: object
      properties:
        secret:
          minLength: 1
          type: string
          description: The payload of the secret to be used for webhook validation.
          example: whsec_123
        status:
          allOf:
            - $ref: '#/components/schemas/WebhookSecretStatus'
            - description: The status of this webhook secret.
      description: >-
        A webhook secret, which can be used to validate that incoming webhook
        messages were sent by Brex.
      x-tags:
        - Schemas
    WebhookSecretStatus:
      type: string
      description: The status of a webhook secret.
      enum:
        - ACTIVE
        - PENDING_REVOKE
        - REVOKED
      x-enumDescriptions:
        ACTIVE: >-
          The webhook secret is active and can be used to validate webhooks from
          Brex.
        PENDING_REVOKE: >-
          The webhook secret is still active, but it will soon be revoked. This
          may happen during key rotations.
        REVOKED: >-
          The webhook secret is no longer active. It cannot be used to validate
          webhooks from Brex.
    WebhookSubscription:
      title: Webhook Subscription
      required:
        - event_types
        - id
        - status
        - url
      type: object
      properties:
        id:
          minLength: 1
          type: string
          description: ID of the webhook subscription.
          example: wsub_123
        group_id:
          type: string
          description: ID of the webhook group to which this subscription applies, if any.
          nullable: true
          example: wg_123
        url:
          type: string
          description: >-
            The URL to which webhook events will be sent. Must be a valid HTTPS
            URL.
          example: https://example.com/webhook
        event_types:
          type: array
          description: List of event types that this webhook subscription listens to.
          example: '["EXPENSE_PAYMENT_UPDATED"]'
          items:
            $ref: '#/components/schemas/WebhookEventType'
        status:
          allOf:
            - $ref: '#/components/schemas/WebhookSubscriptionStatus'
            - description: The status of this webhook subscription.
              example: ACTIVE
      description: >-
        A webhook subscription. When events of the specified event types occur,
        they will be sent to the given URL. If the subscription applies to a
        webhook group, then only events that apply to the members of that group
        will be sent. If it does not apply to any group, then only events that
        don't apply to any specific group will be sent. Webhook groups are only
        available for partners.
      x-tags:
        - Schemas
    WebhookSubscriptionStatus:
      type: string
      description: The status of a webhook subscription.
      enum:
        - ACTIVE
        - INACTIVE
      x-enumDescriptions:
        ACTIVE: >-
          The webhook subscription is active and the associated URL will receive
          the subscribed event types.
        INACTIVE: The webhook subscription is no longer active.
