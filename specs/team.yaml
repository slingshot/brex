        - PHYSICAL
    ChangeCardReason:
      type: string
      description: |

        Reason for card termination.
      enum:
        - CARD_DAMAGED
        - CARD_LOST
        - CARD_NOT_RECEIVED
        - DO_NOT_NEED_PHYSICAL_CARD
        - DO_NOT_NEED_VIRTUAL_CARD
        - FRAUD
        - OTHER
    CompanyResponse:
      required:
