        - legal_name
        - mailing_address
      type: object
      properties:
        id:
          type: string
        legal_name:
          type: string
        mailing_address:
          $ref: '#/components/schemas/Address'
        accountType:
          $ref: '#/components/schemas/AccountType'
    CreateCardRequest:
      required:
        - card_name
        - card_type
        - limit_type
        - owner
      type: object
      properties:
        owner:
          $ref: '#/components/schemas/CardOwner'
        card_name:
          minLength: 1
          type: string
        card_type:
          $ref: '#/components/schemas/CardType'
        limit_type:
          $ref: '#/components/schemas/LimitType'
        spend_controls:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/SpendControlRequest'
        mailing_address:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/Address'
        metadata:
          type: object
          additionalProperties:
            type: string
          description: >

            Set of key value pairs associated with this object. Please do not
            store any personally identifiable or sensitive information here.

            Limitations: maximum of 50 keys, keys cannot exceed 40 characters,
            values cannot exceed 500 characters. 
          nullable: true
        card_attribute_preferences:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/CardAttributePreferences'
      description: >

        The `spend_controls` field is required when `limit_type` = `CARD`.

        The `shipping_address` field is required for physical cards, and the
        first 2 lines of the address must be under 60 characters long.
    CreateDepartmentRequest:
      required:
        - name
      type: object
      properties:
        name:
          minLength: 1
          type: string
          description: Name of the department
        description:
          type: string
          description: Description of the department
          nullable: true
    CreateLocationRequest:
      required:
        - name
      type: object
      properties:
        name:
          minLength: 1
          type: string
          description: Name of the location
        description:
          type: string
          description: Description of the location
          nullable: true
    CreateTitleRequest:
      required:
        - name
      type: object
      properties:
        name:
          minLength: 1
          type: string
          description: Name of the title
    CreateUserRequest:
      required:
        - email
