          type: string
          description: Email address to send card details to
        sender_name:
          type: string
          description: Sender name. Shows up in the subject of the email
        message:
          type: string
          description: Message to send with the card details
          nullable: true
        expiry_days:
          maximum: 30
          type: integer
          description: Link expiry in number of days. Defaults to 30
          format: int32
          nullable: true
    SetUserLimitRequest:
      type: object
      properties:
        monthly_limit:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/Money'
      description: Request that sets the monthly user limit.
    SpendControl:
      type: object
      properties:
        spend_limit:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/Money'
        spend_available:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/Money'
        spend_duration:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/SpendDuration'
        reason:
          type: string
          nullable: true
        lock_after_date:
          type: string
          description: The `lock_after_date` is in UTC.
          format: date
          nullable: true
        allowed_merchant_details:
          type: array
          description: >

            List of merchant details where card transactions are allowed. Empty
            if no allowed merchant details are configured.
          nullable: true
          example: '[{"name": "Github"}, {"name": "AWS"}]'
          items:
            $ref: '#/components/schemas/LockedMerchantDetails'
        blocked_merchant_details:
          type: array
          description: >

            List of merchant details where card transactions are blocked. Empty
            if no blocked merchant details are configured.
          nullable: true
          example: '[{"name": "Apple"}, {"name": "Amazon"}]'
          items:
            $ref: '#/components/schemas/LockedMerchantDetails'
    SpendControlRequest:
      required:
        - spend_duration
        - spend_limit
      type: object
      properties:
        spend_limit:
          $ref: '#/components/schemas/Money'
        spend_duration:
          $ref: '#/components/schemas/SpendDuration'
        reason:
          type: string
          nullable: true
        lock_after_date:
          type: string
          format: date
          nullable: true
        parent_budget_id:
          type: string
          description: >

            If using the Empower platform, a new `budget` will be created for
            this card. You can specify a `parent_budget` that your new

            `budget` will be nested under. If `parent_budget_id` is null, we
            will nest the new budget under the top-level account `budget`.
          nullable: true
        policy_id:
          type: string
          nullable: true
        allowed_merchant_details:
          maxItems: 50
          type: array
          description: >

            List of merchants where card transactions are allowed. Cannot be
            used together with blocked_merchant_details. Maximum 50 

            merchant details.
          nullable: true
          example: '[{"name": "Github"}, {"name": "AWS"}]'
          items:
            $ref: '#/components/schemas/LockedMerchantDetails'
        blocked_merchant_details:
          maxItems: 50
          type: array
          description: >

            List of merchants where card transactions are blocked. Cannot be
            used together with allowed_merchant_details. Maximum 50 

            merchant details.
          nullable: true
          example: '[{"name": "Apple"}, {"name": "Amazon"}]'
          items:
            $ref: '#/components/schemas/LockedMerchantDetails'
      description: >

        When `limit_type = CARD`, `spend_controls` must be set. When `limit type
        = USER`, `spend_controls` must be `null`.
    SpendControlUpdateRequest:
      type: object
      properties:
        spend_limit:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/Money'
        spend_duration:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/SpendDuration'
        reason:
          type: string
          nullable: true
        lock_after_date:
          type: string
          format: date
          nullable: true
        allowed_merchant_details:
          maxItems: 50
          type: array
          description: >

            List of merchants where card transactions are allowed. Cannot be
            used together with blocked_merchant_details. Maximum 50 

            merchant details.
          nullable: true
          example: '[{"name": "Github"}, {"name": "AWS"}]'
          items:
            $ref: '#/components/schemas/LockedMerchantDetails'
        blocked_merchant_details:
          maxItems: 50
          type: array
          description: >

            List of merchants where card transactions are blocked. Cannot be
            used together with allowed_merchant_details. Maximum 50 

            merchant details.
          nullable: true
          example: '[{"name": "Apple"}, {"name": "Amazon"}]'
          items:
            $ref: '#/components/schemas/LockedMerchantDetails'
    SpendDuration:
      type: string
      description: |2

            Spend limit refresh frequency
            - MONTHLY: The spend limit refreshes every month
            - QUARTERLY: The spend limit refreshes every quarter
            - YEARLY: The spend limit refreshes every year
            - ONE_TIME: The limit does not refresh
      enum:
        - MONTHLY
        - QUARTERLY
        - YEARLY
        - ONE_TIME
