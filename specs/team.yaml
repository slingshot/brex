        department_id:
          type: string
          nullable: true
        location_id:
          type: string
          nullable: true
        title_id:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties:
            type: string
          description: >-
            The metadata or customized attributes of the user. Maximum number of
            entries: 100
          nullable: true
    DepartmentResponse:
      required:
        - id
        - name
      type: object
      properties:
        id:
          type: string
        name:
          type: string
          description: Name of the department
        description:
          type: string
          description: Description of the department
          nullable: true
    LegalEntity:
      title: |

        Legal Entity
      required:
        - billingAddress
        - createdAt
        - displayName
        - id
        - status
      type: object
      properties:
        id:
          type: string
          description: |

            The ID of this legal entity.
        displayName:
          type: string
          description: |

            The display name of this legal entity.
        billingAddress:
          allOf:
            - $ref: '#/components/schemas/Address'
            - description: >

                The billing address of this legal entity. Also used as billing
                address for cards issued to users who belong to this entity.
        createdAt:
          type: string
          description: |

            Timestamp, in UTC, when this legal entity was created.
          format: date-time
        status:
          allOf:
            - $ref: '#/components/schemas/LegalEntityStatus'
            - description: |

                The current status of this legal entity.
        isDefault:
          type: boolean
          description: |

            Whether this is the default entity of the account.
      description: |

        A Brex legal entity.
    LegalEntityStatus:
      type: string
      description: |

        The possible statuses for an entity's verification in Brex.
      enum:
        - UNSUBMITTED
        - UNVERIFIED
        - IN_PROGRESS
        - VERIFIED
        - REJECTED
    LimitType:
      type: string
      description: >

        `limit_type = CARD` for vendor cards. Vendor cards must have a
        `card_type` of `VIRTUAL` 

        and do not rely on the user specific limit. 


        For corporate cards, `limit_type = USER`.


        Learn more about different card types
        [here](https://support.brex.com/what-are-the-different-types-of-cards-i-can-get/).
      enum:
        - CARD
        - USER
    LocationResponse:
      required:
        - id
        - name
      type: object
      properties:
        id:
          type: string
        name:
          type: string
          description: Name of the location
        description:
          type: string
          description: Description of the location
          nullable: true
    LockCardRequest:
      required:
        - reason
      type: object
      properties:
        description:
          type: string
          description: Description for locking a card
          nullable: true
        reason:
          $ref: '#/components/schemas/ChangeCardReason'
      description: Parameters for locking a card.
    LockedMerchantDetails:
      required:
        - name
      type: object
      properties:
        name:
          type: string
          description: The name of the merchant.
          example: Github
      description: |

        Merchant details used for restricting or blocking transactions.
    Money:
      required:
        - amount
      type: object
      properties:
        amount:
          type: integer
          description: >-
            The amount of money, in the smallest denomination of the currency
            indicated by currency. For example, when currency is USD, amount is
            in cents.
          format: int64
          example: 700
        currency:
          type: string
          description: The type of currency, in ISO 4217 format.
          nullable: true
          example: USD
          default: USD
      description: >

        Money fields can be signed or unsigned. Fields are signed (an unsigned
        value will be interpreted as positive). The amount of money will be
        represented in the smallest denomination

        of the currency indicated. For example, USD 7.00 will be represented in
        cents with an amount of 700.
    OwnerType:
      type: string
      enum:
        - USER
