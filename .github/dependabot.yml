version: 2
updates:
  - package-ecosystem: bun
    directory: /
    schedule:
      interval: weekly
    commit-message:
      # "chore(deps): bump …" — keeps commitlint/conventional commits happy
      prefix: chore
      include: scope
    groups:
      dependencies:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
      include: scope
    groups:
      actions:
        patterns: ["*"]
