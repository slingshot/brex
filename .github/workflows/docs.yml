name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'src/**'
      - 'specs/**'
      - 'tsconfig*.json'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'src/**'
      - 'specs/**'
      - 'tsconfig*.json'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Least-privilege by default; the deploy job elevates what it needs.
permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      # Self-contained: the docs sub-project has its own lockfile. The API
      # reference is generated from ../src by starlight-typedoc at build time,
      # so the library itself does not need to be installed or built.
      - name: Install docs dependencies
        working-directory: docs
        run: bun install --frozen-lockfile

      - name: Build site
        working-directory: docs
        run: bun run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

  deploy:
    # PRs build (above) to prove the site compiles; only main publishes.
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
